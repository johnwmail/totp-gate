name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
          fail_ci_if_error: false

  integration-test:
    name: Integration Test (TLS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container
        run: docker build -t totp-gate:test .

      - name: Verify CA certificates are present
        run: |
          docker run --rm --entrypoint test totp-gate:test -f /etc/ssl/certs/ca-certificates.crt
          echo "CA bundle found in container"

      - name: Test proxy to real HTTPS upstream (google.com)
        run: |
          docker run -d --name test-google \
            -e TOTPGATE_UPSTREAM=https://www.google.com \
            -e TOTPGATE_TOTP_SECRET=JBSWY3DPEHPK3PXP \
            -e TOTPGATE_AUTH_DISABLED=true \
            --network host \
            totp-gate:test
          sleep 3

          # Verify TLS validation works against real public certs
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --resolve www.google.com:8080:127.0.0.1 \
            http://www.google.com:8080/)
          echo "google.com response: $CODE"
          if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 400 ]; then
            echo "Single-target HTTPS proxy: PASSED"
          else
            docker logs test-google
            exit 1
          fi
          docker rm -f test-google

      - name: Test multi-target routing with real HTTPS backends
        run: |
          docker run -d --name test-multi \
            -e TOTPGATE_TARGETS="google.com=https://www.google.com,github.com=https://github.com" \
            -e TOTPGATE_TOTP_SECRET=JBSWY3DPEHPK3PXP \
            -e TOTPGATE_AUTH_DISABLED=true \
            --network host \
            totp-gate:test
          sleep 3

          # Route 1: google.com:8080 -> localhost:8080 -> https://www.google.com
          CODE1=$(curl -s -o /dev/null -w "%{http_code}" \
            --resolve google.com:8080:127.0.0.1 \
            http://google.com:8080/)
          echo "google.com response: $CODE1"

          # Route 2: github.com:8080 -> localhost:8080 -> https://github.com
          CODE2=$(curl -s -o /dev/null -w "%{http_code}" \
            --resolve github.com:8080:127.0.0.1 \
            http://github.com:8080/)
          echo "github.com response: $CODE2"

          if [ "$CODE1" -ge 200 ] && [ "$CODE1" -lt 400 ] && \
             [ "$CODE2" -ge 200 ] && [ "$CODE2" -lt 400 ]; then
            echo "Multi-target HTTPS routing: PASSED"
          else
            docker logs test-multi
            exit 1
          fi
          docker rm -f test-multi
