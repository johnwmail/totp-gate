name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
          fail_ci_if_error: false

  integration-test:
    name: Integration Test (TLS & Auth)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container
        run: docker build -t totp-gate:test .

      - name: Test proxy to real HTTPS upstream (google.com) with Auth
        run: |
          docker run -d --name test-google \
            -e TOTPGATE_UPSTREAM=https://www.google.com \
            -e TOTPGATE_TOTP_SECRET=JBSWY3DPEHPK3PXP \
            --network host \
            totp-gate:test
          sleep 3

          # Generate valid TOTP code
          CODE=$(python3 -c "
          import hmac, hashlib, struct, time, base64
          def hotp(key, counter, digits=6):
              key = base64.b32decode(key.upper())
              msg = struct.pack('>Q', counter)
              h = hmac.new(key, msg, hashlib.sha1).digest()
              o = h[19] & 15
              return str((struct.unpack('>I', h[o:o+4])[0] & 0x7fffffff) % 10**digits).zfill(digits)
          print(hotp('JBSWY3DPEHPK3PXP', int(time.time()) // 30))
          ")
          echo "Generated TOTP Code: $CODE"

          # Login and save cookie
          LOGIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -c /tmp/cookie.txt \
            -X POST -d "code=$CODE" http://localhost:8080/totp-gate/login)
          echo "Login Status: $LOGIN_STATUS"

          if [ "$LOGIN_STATUS" != "303" ]; then
            echo "Login failed"
            docker logs test-google
            docker rm -f test-google
            exit 1
          fi

          # Access upstream with cookie (follow redirects)
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -b /tmp/cookie.txt -L \
            --resolve www.google.com:8080:127.0.0.1 \
            http://www.google.com:8080/)
          echo "google.com response: $CODE"

          if [ "$CODE" -ne 200 ]; then
            echo "Proxy failed"
            docker logs test-google
            docker rm -f test-google
            exit 1
          fi
          echo "Single-target HTTPS proxy with Auth: PASSED"
          docker rm -f test-google

      - name: Test multi-target routing with real HTTPS backends and Auth
        run: |
          docker run -d --name test-multi \
            -e TOTPGATE_TARGETS="www.google.com=https://www.google.com,github.com=https://github.com" \
            -e TOTPGATE_TOTP_SECRET=JBSWY3DPEHPK3PXP \
            --network host \
            totp-gate:test
          sleep 3

          # Generate valid TOTP code
          CODE=$(python3 -c "
          import hmac, hashlib, struct, time, base64
          def hotp(key, counter, digits=6):
              key = base64.b32decode(key.upper())
              msg = struct.pack('>Q', counter)
              h = hmac.new(key, msg, hashlib.sha1).digest()
              o = h[19] & 15
              return str((struct.unpack('>I', h[o:o+4])[0] & 0x7fffffff) % 10**digits).zfill(digits)
          print(hotp('JBSWY3DPEHPK3PXP', int(time.time()) // 30))
          ")
          echo "Generated TOTP Code: $CODE"

          # Login and save cookie
          LOGIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -c /tmp/cookie.txt \
            -X POST -d "code=$CODE" http://localhost:8080/totp-gate/login)
          echo "Login Status: $LOGIN_STATUS"

          if [ "$LOGIN_STATUS" != "303" ]; then
            echo "Login failed"
            docker logs test-multi
            docker rm -f test-multi
            exit 1
          fi

          # Route 1: www.google.com:8080 -> localhost:8080 -> https://www.google.com
          CODE1=$(curl -s -o /dev/null -w "%{http_code}" -b /tmp/cookie.txt -L \
            --resolve www.google.com:8080:127.0.0.1 \
            http://www.google.com:8080/)
          echo "www.google.com response: $CODE1"

          # Route 2: github.com:8080 -> localhost:8080 -> https://github.com
          CODE2=$(curl -s -o /dev/null -w "%{http_code}" -b /tmp/cookie.txt -L \
            --resolve github.com:8080:127.0.0.1 \
            http://github.com:8080/)
          echo "github.com response: $CODE2"

          if [ "$CODE1" -ne 200 ] || [ "$CODE2" -ne 200 ]; then
            echo "Proxy failed"
            docker logs test-multi
            docker rm -f test-multi
            exit 1
          fi
          echo "Multi-target HTTPS routing with Auth: PASSED"
          docker rm -f test-multi

      - name: Test path-prefix routing with local backends and Auth
        run: |
          # Start two simple HTTP backends using Python's built-in HTTP server.
          # We serve from two different directories so each returns a distinct response.
          mkdir -p /tmp/backend-api /tmp/backend-web
          echo "api-reply" > /tmp/backend-api/index.html
          echo "web-reply" > /tmp/backend-web/index.html
          python3 -m http.server 9001 --directory /tmp/backend-api &
          python3 -m http.server 9002 --directory /tmp/backend-web &
          sleep 1

          # Start totp-gate with path-prefix targets:
          #   app.example.com/api -> backend-api (port 9001)
          #   app.example.com     -> backend-web (port 9002)
          #   default             -> backend-web (port 9002, fallback for unmatched hosts)
          docker run -d --name test-prefix \
            -e TOTPGATE_TARGETS="app.example.com/api=http://localhost:9001,app.example.com=http://localhost:9002,default=http://localhost:9002" \
            -e TOTPGATE_TOTP_SECRET=JBSWY3DPEHPK3PXP \
            -e TOTPGATE_AUTH_COOKIE_SECURE=false \
            --network host \
            totp-gate:test
          sleep 3

          RESOLVE="--resolve app.example.com:8080:127.0.0.1"

          # Generate valid TOTP code
          TOTP_CODE=$(python3 -c "
          import hmac, hashlib, struct, time, base64
          def hotp(key, counter, digits=6):
              key = base64.b32decode(key.upper())
              msg = struct.pack('>Q', counter)
              h = hmac.new(key, msg, hashlib.sha1).digest()
              o = h[19] & 15
              return str((struct.unpack('>I', h[o:o+4])[0] & 0x7fffffff) % 10**digits).zfill(digits)
          print(hotp('JBSWY3DPEHPK3PXP', int(time.time()) // 30))
          ")
          echo "Generated TOTP Code: $TOTP_CODE"

          # Login via app.example.com (so the cookie is scoped to that domain)
          LOGIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $RESOLVE \
            -c /tmp/cookie-prefix.txt \
            -X POST -d "code=$TOTP_CODE" \
            http://app.example.com:8080/totp-gate/login)
          echo "Login Status: $LOGIN_STATUS"

          if [ "$LOGIN_STATUS" != "303" ]; then
            echo "Login failed"
            docker logs test-prefix
            docker rm -f test-prefix
            kill %1 %2 2>/dev/null || true
            exit 1
          fi

          # Test 1: /api routes to api backend
          HTTP1=$(curl -s -o /dev/null -w "%{http_code}" $RESOLVE \
            -b /tmp/cookie-prefix.txt \
            http://app.example.com:8080/api)
          echo "/api response: $HTTP1"

          # Test 2: /api/users (subpath) also routes to api backend
          HTTP2=$(curl -s -o /dev/null -w "%{http_code}" $RESOLVE \
            -b /tmp/cookie-prefix.txt \
            http://app.example.com:8080/api/users)
          echo "/api/users response: $HTTP2"

          # Test 3: / routes to web backend
          HTTP3=$(curl -s -o /dev/null -w "%{http_code}" $RESOLVE \
            -b /tmp/cookie-prefix.txt \
            http://app.example.com:8080/)
          echo "/ response: $HTTP3"

          # Test 4: /apifoo must NOT match /api prefix — routes to web backend
          HTTP4=$(curl -s -o /dev/null -w "%{http_code}" $RESOLVE \
            -b /tmp/cookie-prefix.txt \
            http://app.example.com:8080/apifoo)
          echo "/apifoo response: $HTTP4"

          # Test 5: unknown host with default fallback — use other.example.com resolving to same gateway
          HTTP5=$(curl -s -o /dev/null -w "%{http_code}" \
            --resolve other.example.com:8080:127.0.0.1 \
            -b /tmp/cookie-prefix.txt \
            http://other.example.com:8080/)
          echo "unknown host with default response: $HTTP5"

          docker rm -f test-prefix

          # Test 6: unknown host without default returns 404 — start new instance without default
          docker run -d --name test-prefix-no-default \
            -e TOTPGATE_TARGETS="app.example.com/api=http://localhost:9001,app.example.com=http://localhost:9002" \
            -e TOTPGATE_TOTP_SECRET=JBSWY3DPEHPK3PXP \
            -e TOTPGATE_AUTH_COOKIE_SECURE=false \
            --network host \
            totp-gate:test
          sleep 3

          TOTP_CODE2=$(python3 -c "
          import hmac, hashlib, struct, time, base64
          def hotp(key, counter, digits=6):
              key = base64.b32decode(key.upper())
              msg = struct.pack('>Q', counter)
              h = hmac.new(key, msg, hashlib.sha1).digest()
              o = h[19] & 15
              return str((struct.unpack('>I', h[o:o+4])[0] & 0x7fffffff) % 10**digits).zfill(digits)
          print(hotp('JBSWY3DPEHPK3PXP', int(time.time()) // 30))
          ")
          LOGIN_STATUS2=$(curl -s -o /dev/null -w "%{http_code}" $RESOLVE \
            -c /tmp/cookie-prefix2.txt \
            -X POST -d "code=$TOTP_CODE2" \
            http://app.example.com:8080/totp-gate/login)
          echo "Login2 Status: $LOGIN_STATUS2"

          HTTP6=$(curl -s -o /dev/null -w "%{http_code}" \
            --resolve other.example.com:8080:127.0.0.1 \
            -b /tmp/cookie-prefix2.txt \
            http://other.example.com:8080/)
          echo "unknown host no-default response: $HTTP6"

          FAILED=0
          [ "$HTTP1" -ne 200 ] && echo "FAIL: /api should return 200, got $HTTP1" && FAILED=1
          [ "$HTTP2" -ne 200 ] && echo "FAIL: /api/users should return 200, got $HTTP2" && FAILED=1
          [ "$HTTP3" -ne 200 ] && echo "FAIL: / should return 200, got $HTTP3" && FAILED=1
          [ "$HTTP4" -ne 200 ] && echo "FAIL: /apifoo should return 200 (web backend), got $HTTP4" && FAILED=1
          [ "$HTTP5" -ne 200 ] && echo "FAIL: unknown host with default should return 200, got $HTTP5" && FAILED=1
          [ "$HTTP6" -ne 404 ] && echo "FAIL: unknown host without default should return 404, got $HTTP6" && FAILED=1

          docker rm -f test-prefix-no-default
          kill %1 %2 2>/dev/null || true

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
          echo "Path-prefix routing integration test: PASSED"
