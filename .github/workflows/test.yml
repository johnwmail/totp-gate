name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
          fail_ci_if_error: false

  integration-test:
    name: Integration Test (TLS & Auth)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container
        run: docker build -t totp-gate:test .

      - name: Test proxy to real HTTPS upstream (google.com) with Auth
        run: |
          docker run -d --name test-google \
            -e TOTPGATE_UPSTREAM=https://www.google.com \
            -e TOTPGATE_TOTP_SECRET=JBSWY3DPEHPK3PXP \
            --network host \
            totp-gate:test
          sleep 3

          # Generate valid TOTP code
          CODE=$(python3 -c "
          import hmac, hashlib, struct, time, base64
          def hotp(key, counter, digits=6):
              key = base64.b32decode(key.upper())
              msg = struct.pack('>Q', counter)
              h = hmac.new(key, msg, hashlib.sha1).digest()
              o = h[19] & 15
              return str((struct.unpack('>I', h[o:o+4])[0] & 0x7fffffff) % 10**digits).zfill(digits)
          print(hotp('JBSWY3DPEHPK3PXP', int(time.time()) // 30))
          ")
          echo "Generated TOTP Code: $CODE"

          # Login and save cookie
          LOGIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -c /tmp/cookie.txt \
            -X POST -d "code=$CODE" http://localhost:8080/totp-gate/login)
          echo "Login Status: $LOGIN_STATUS"

          if [ "$LOGIN_STATUS" != "303" ]; then
            echo "Login failed"
            docker logs test-google
            docker rm -f test-google
            exit 1
          fi

          # Access upstream with cookie (follow redirects)
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -b /tmp/cookie.txt -L \
            --resolve www.google.com:8080:127.0.0.1 \
            http://www.google.com:8080/)
          echo "google.com response: $CODE"

          if [ "$CODE" -ne 200 ]; then
            echo "Proxy failed"
            docker logs test-google
            docker rm -f test-google
            exit 1
          fi
          echo "Single-target HTTPS proxy with Auth: PASSED"
          docker rm -f test-google

      - name: Test multi-target routing with real HTTPS backends and Auth
        run: |
          docker run -d --name test-multi \
            -e TOTPGATE_TARGETS="www.google.com=https://www.google.com,github.com=https://github.com" \
            -e TOTPGATE_TOTP_SECRET=JBSWY3DPEHPK3PXP \
            --network host \
            totp-gate:test
          sleep 3

          # Generate valid TOTP code
          CODE=$(python3 -c "
          import hmac, hashlib, struct, time, base64
          def hotp(key, counter, digits=6):
              key = base64.b32decode(key.upper())
              msg = struct.pack('>Q', counter)
              h = hmac.new(key, msg, hashlib.sha1).digest()
              o = h[19] & 15
              return str((struct.unpack('>I', h[o:o+4])[0] & 0x7fffffff) % 10**digits).zfill(digits)
          print(hotp('JBSWY3DPEHPK3PXP', int(time.time()) // 30))
          ")
          echo "Generated TOTP Code: $CODE"

          # Login and save cookie
          LOGIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -c /tmp/cookie.txt \
            -X POST -d "code=$CODE" http://localhost:8080/totp-gate/login)
          echo "Login Status: $LOGIN_STATUS"

          if [ "$LOGIN_STATUS" != "303" ]; then
            echo "Login failed"
            docker logs test-multi
            docker rm -f test-multi
            exit 1
          fi

          # Route 1: www.google.com:8080 -> localhost:8080 -> https://www.google.com
          CODE1=$(curl -s -o /dev/null -w "%{http_code}" -b /tmp/cookie.txt -L \
            --resolve www.google.com:8080:127.0.0.1 \
            http://www.google.com:8080/)
          echo "www.google.com response: $CODE1"

          # Route 2: github.com:8080 -> localhost:8080 -> https://github.com
          CODE2=$(curl -s -o /dev/null -w "%{http_code}" -b /tmp/cookie.txt -L \
            --resolve github.com:8080:127.0.0.1 \
            http://github.com:8080/)
          echo "github.com response: $CODE2"

          if [ "$CODE1" -ne 200 ] || [ "$CODE2" -ne 200 ]; then
            echo "Proxy failed"
            docker logs test-multi
            docker rm -f test-multi
            exit 1
          fi
          echo "Multi-target HTTPS routing with Auth: PASSED"
          docker rm -f test-multi

      - name: Test path-prefix routing with local backends and Auth
        run: |
          # Start two simple HTTP backends using Python's built-in HTTP server.
          # We serve from two different directories so each returns a distinct body.
          # Create files at the paths the tests will hit so we can check the body.
          mkdir -p /tmp/backend-api/api/users /tmp/backend-web/apifoo
          echo "api-reply" > /tmp/backend-api/index.html
          echo "api-reply" > /tmp/backend-api/api/index.html
          echo "api-reply" > /tmp/backend-api/api/users/index.html
          echo "web-reply" > /tmp/backend-web/index.html
          echo "web-reply" > /tmp/backend-web/apifoo/index.html
          python3 -m http.server 9001 --directory /tmp/backend-api &
          python3 -m http.server 9002 --directory /tmp/backend-web &
          sleep 1

          # Helper: generate a TOTP code
          gen_totp() {
            python3 -c "
          import hmac, hashlib, struct, time, base64
          def hotp(key, counter, digits=6):
              key = base64.b32decode(key.upper())
              msg = struct.pack('>Q', counter)
              h = hmac.new(key, msg, hashlib.sha1).digest()
              o = h[19] & 15
              return str((struct.unpack('>I', h[o:o+4])[0] & 0x7fffffff) % 10**digits).zfill(digits)
          print(hotp('JBSWY3DPEHPK3PXP', int(time.time()) // 30))
          "
          }

          # Helper: login and save cookie to a file, returns 0 on success
          do_login() {
            local resolve="$1" cookiefile="$2"
            local code; code=$(gen_totp)
            echo "Logging in with code $code (resolve=$resolve, cookie=$cookiefile)"
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" $resolve \
              -c "$cookiefile" \
              -X POST -d "code=$code" \
              http://app.example.com:8080/totp-gate/login)
            echo "Login status: $status"
            [ "$status" = "303" ]
          }

          # --- Phase 1: test routing with default fallback ---
          docker run -d --name test-prefix \
            -e TOTPGATE_TARGETS="app.example.com/api=http://localhost:9001,app.example.com=http://localhost:9002,default=http://localhost:9002" \
            -e TOTPGATE_TOTP_SECRET=JBSWY3DPEHPK3PXP \
            -e TOTPGATE_AUTH_COOKIE_SECURE=false \
            --network host \
            totp-gate:test
          sleep 3

          RESOLVE_APP="--resolve app.example.com:8080:127.0.0.1"

          do_login "$RESOLVE_APP" /tmp/cookie-prefix.txt || {
            echo "Login failed"
            docker logs test-prefix
            docker rm -f test-prefix
            kill %1 %2 2>/dev/null || true
            exit 1
          }

          # Test 1: /api/ routes to api backend (check body contains "api-reply")
          BODY1=$(curl -s $RESOLVE_APP -b /tmp/cookie-prefix.txt \
            http://app.example.com:8080/api/)
          echo "/api/ body: $BODY1"

          # Test 2: /api/users/ (subpath) also routes to api backend
          BODY2=$(curl -s $RESOLVE_APP -b /tmp/cookie-prefix.txt \
            http://app.example.com:8080/api/users/)
          echo "/api/users/ body: $BODY2"

          # Test 3: / routes to web backend (check body contains "web-reply")
          BODY3=$(curl -s $RESOLVE_APP -b /tmp/cookie-prefix.txt \
            http://app.example.com:8080/)
          echo "/ body: $BODY3"

          # Test 4: /apifoo/ must NOT match /api prefix — routes to web backend
          BODY4=$(curl -s $RESOLVE_APP -b /tmp/cookie-prefix.txt \
            http://app.example.com:8080/apifoo/)
          echo "/apifoo/ body: $BODY4"

          # Test 5: unknown host with default fallback — login via other.example.com first
          RESOLVE_OTHER="--resolve other.example.com:8080:127.0.0.1"
          # Reuse app.example.com login endpoint but resolve as other (the login page itself
          # doesn't care about the host for routing, just sets the cookie for the domain used).
          # We must login with other.example.com host so the cookie domain matches.
          CODE5=$(gen_totp)
          LOGIN5=$(curl -s -o /dev/null -w "%{http_code}" $RESOLVE_OTHER \
            --resolve other.example.com:8080:127.0.0.1 \
            -c /tmp/cookie-other.txt \
            -X POST -d "code=$CODE5" \
            http://other.example.com:8080/totp-gate/login)
          echo "Login5 status: $LOGIN5"
          HTTP5=$(curl -s -o /dev/null -w "%{http_code}" $RESOLVE_OTHER \
            -b /tmp/cookie-other.txt \
            http://other.example.com:8080/)
          echo "unknown host with default response: $HTTP5"

          docker rm -f test-prefix

          # --- Phase 2: test unknown host without default returns 404 ---
          docker run -d --name test-prefix-no-default \
            -e TOTPGATE_TARGETS="app.example.com/api=http://localhost:9001,app.example.com=http://localhost:9002" \
            -e TOTPGATE_TOTP_SECRET=JBSWY3DPEHPK3PXP \
            -e TOTPGATE_AUTH_COOKIE_SECURE=false \
            --network host \
            totp-gate:test
          sleep 3

          # Login via app.example.com for the no-default instance
          do_login "$RESOLVE_APP" /tmp/cookie-prefix2.txt || {
            echo "Login2 failed"
            docker logs test-prefix-no-default
            docker rm -f test-prefix-no-default
            kill %1 %2 2>/dev/null || true
            exit 1
          }

          # Test 6: unknown host without default — the auth cookie is for app.example.com,
          # but other.example.com has no route and no default; the gateway should 404
          # before even checking auth. Verify using app-domain cookie (won't be sent for
          # other.example.com, so the gateway will redirect to login — that's a 303, not 404).
          # Instead: log in via other.example.com then hit it to get 404.
          CODE6=$(gen_totp)
          LOGIN6=$(curl -s -o /dev/null -w "%{http_code}" $RESOLVE_OTHER \
            -c /tmp/cookie-nodefault-other.txt \
            -X POST -d "code=$CODE6" \
            http://other.example.com:8080/totp-gate/login)
          echo "Login6 status: $LOGIN6"
          HTTP6=$(curl -s -o /dev/null -w "%{http_code}" $RESOLVE_OTHER \
            -b /tmp/cookie-nodefault-other.txt \
            http://other.example.com:8080/)
          echo "unknown host no-default response: $HTTP6"

          FAILED=0
          echo "$BODY1" | grep -q "api-reply" || { echo "FAIL: /api/ should reach api backend, body: $BODY1"; FAILED=1; }
          echo "$BODY2" | grep -q "api-reply" || { echo "FAIL: /api/users/ should reach api backend, body: $BODY2"; FAILED=1; }
          echo "$BODY3" | grep -q "web-reply" || { echo "FAIL: / should reach web backend, body: $BODY3"; FAILED=1; }
          echo "$BODY4" | grep -q "web-reply" || { echo "FAIL: /apifoo/ should reach web backend (not api), body: $BODY4"; FAILED=1; }
          [ "$HTTP5" -ne 200 ] && echo "FAIL: unknown host with default should return 200, got $HTTP5" && FAILED=1
          [ "$HTTP6" -ne 404 ] && echo "FAIL: unknown host without default should return 404, got $HTTP6" && FAILED=1

          docker rm -f test-prefix-no-default
          kill %1 %2 2>/dev/null || true

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
          echo "Path-prefix routing integration test: PASSED"
